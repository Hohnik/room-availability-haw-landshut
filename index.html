<!DOCTYPE html>
<html lang="de">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="Raumverfügbarkeit an der HAW Landshut – Räume belegt oder frei?">
		<meta name="theme-color" content="#003366">
		<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='1em' font-size='1'>🏛</text></svg>">
		<title>Raumverfügbarkeit – HAW Landshut</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>

		<header>
			<div class="header-inner">
				<h1>Raumverfügbarkeit</h1>
				<p class="subtitle">Hochschule für angewandte Wissenschaften Landshut</p>
			</div>
		</header>

		<main>
			<section class="favorites-section hidden" id="favorites-section">
				<h2>Favoriten</h2>
				<div class="room-grid" id="favorites-grid"></div>
			</section>

			<section class="map-section" id="map-section">
				<h2>Gebäude wählen</h2>
				<div class="map-container">
					<svg class="campus-floorplan" id="map-overlay" viewBox="547 373 1952 1805" xmlns="http://www.w3.org/2000/svg" aria-label="Campusplan HAW Landshut"></svg>
					<div class="map-tooltip hidden" id="map-tooltip">
						<strong id="tooltip-label"></strong>
						<span id="tooltip-desc"></span>
					</div>
				</div>
			</section>

			<section class="selector-section hidden" id="room-section">
				<h2>Raum wählen – <span id="selected-building-label"></span></h2>
				<div class="room-grid" id="room-grid"></div>
				<p class="tip">Raum gedrückt halten, um ihn als Favorit zu speichern</p>
			</section>

			<section class="availability-section hidden" id="availability-section">
				<h2>Verfügbarkeit – <span id="selected-room-label"></span></h2>
				<div id="week-view"></div>
			</section>
		</main>

		<footer>
			<p>Made by <a href="https://github.com/Hohnik" target="_blank" rel="noopener">Niklas Hohn</a></p>
			<p>Feedback to <a href="mailto:mail@niklashohn.com">mail@niklashohn.com</a></p>
		</footer>

		<script src="script.js"></script>
	</body>
</html>
