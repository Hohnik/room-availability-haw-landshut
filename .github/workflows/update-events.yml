name: Update room events

on:
  schedule:
    - cron: '0 5 * * *'  # 7am CET (6am UTC in winter, acceptable)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 .github/scripts/fetch_events.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update room events"
            git push
          fi
